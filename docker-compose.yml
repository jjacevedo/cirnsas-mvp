services:
  mysql:
    image: mysql:8.4
    container_name: cirnsas_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cirnsas_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cirnsas_backend
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: cirnsas_db
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: cirnsas_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
